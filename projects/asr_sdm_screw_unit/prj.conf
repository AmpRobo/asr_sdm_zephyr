# ICM-42688 sensor demo configuration

# Enable SPI bus
CONFIG_SPI=y

# Enable sensor subsystem
CONFIG_SENSOR=y

# Enable floating-point printf support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Logging configuration
CONFIG_LOG=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# Enable USB CDC ACM (serial over USB)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Wait for USB connection before startup (optional to avoid missing boot logs)
CONFIG_BOOT_DELAY=1000
